<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Pokéball 디자인 배경 원 -->
  <circle cx="100" cy="90" r="85" fill="#1a1a2e" stroke="#FFD700" stroke-width="3"/>
  
  <!-- Pokéball 위쪽 (빨간) -->
  <path d="M20 90 A80 80 0 0 1 180 90 Z" fill="#E3350D"/>
  <!-- Pokéball 아래쪽 (흰) -->
  <path d="M20 90 A80 80 0 0 0 180 90 Z" fill="white"/>
  <!-- 가운데 선 -->
  <line x1="20" y1="90" x2="180" y2="90" stroke="#1a1a2e" stroke-width="6"/>
  <!-- 중앙 원 (바깥) -->
  <circle cx="100" cy="90" r="22" fill="#1a1a2e"/>
  <!-- 중앙 원 (안쪽 흰) -->
  <circle cx="100" cy="90" r="15" fill="white" stroke="#1a1a2e" stroke-width="3"/>
  <!-- 중앙 작은 원 (버튼) -->
  <circle cx="100" cy="90" r="7" fill="#F5F0DC" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- POKÉMON 텍스트 스타일 - 상단 -->
  <text x="100" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="18" fill="#FFD700" stroke="#2A5DB0" stroke-width="4" paint-order="stroke">POKÉMON</text>
  
  <!-- 별빛 장식 -->
  <circle cx="30" cy="30" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="170" cy="30" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="160" cy="150" r="2.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="40" cy="150" r="2" fill="#FFD700" opacity="0.5"/>
</svg>
