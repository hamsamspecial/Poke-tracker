<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- 알 몸통 (크림색 배경) -->
  <ellipse cx="50" cy="65" rx="36" ry="44" fill="#F5F0DC" stroke="#3D2B1F" stroke-width="3"/>
  <!-- 큰 반점 (중앙) -->
  <ellipse cx="50" cy="70" rx="14" ry="11" fill="VAR_COLOR" opacity="0.85"/>
  <!-- 왼쪽 아래 반점 -->
  <ellipse cx="30" cy="82" rx="8" ry="6" fill="VAR_COLOR" opacity="0.75"/>
  <!-- 오른쪽 위 반점 -->
  <ellipse cx="65" cy="55" rx="6" ry="5" fill="VAR_COLOR" opacity="0.70"/>
  <!-- 왼쪽 위 작은 반점 -->
  <ellipse cx="34" cy="52" rx="4" ry="3.5" fill="VAR_COLOR" opacity="0.65"/>
  <!-- 오른쪽 아래 작은 반점 -->
  <ellipse cx="66" cy="85" rx="5" ry="4" fill="VAR_COLOR" opacity="0.65"/>
  <!-- 위쪽 작은 반점 -->
  <ellipse cx="54" cy="40" rx="3.5" ry="3" fill="VAR_COLOR" opacity="0.6"/>
  <!-- 하이라이트 (광택) -->
  <ellipse cx="38" cy="45" rx="7" ry="5" fill="white" opacity="0.4"/>
  <!-- 윤곽선 재강조 -->
  <ellipse cx="50" cy="65" rx="36" ry="44" fill="none" stroke="#3D2B1F" stroke-width="3"/>
</svg>
